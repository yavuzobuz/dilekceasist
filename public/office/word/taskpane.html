<!doctype html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DilekceAsist Word Panel</title>
    <link rel="stylesheet" href="./taskpane.css?v=20260303-4" />
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
    <main class="container">
        <header>
            <h1>AI Hukuk Chatbotu</h1>
            <p>Word icindeki secili metin uzerinden karar arama, metin duzeltme, beyin firtinasi ve web aramasi yapin.</p>
        </header>

        <section class="card">
            <h2>1) Secimi Al</h2>
            <button id="readSelectionBtn" class="btn btn-secondary" type="button">Secili Metni Getir</button>
            <label class="field">
                <span>Secili metin</span>
                <textarea id="sourceText" rows="8" placeholder="Word'de bir metin secin ve butona basin."></textarea>
            </label>
        </section>

        <section class="card">
            <h2>2) Chatbot</h2>
            <div class="quick-grid">
                <button class="btn btn-primary" data-action="decision-search" type="button">Karar Arama</button>
                <button class="btn btn-primary" data-action="text-fix" type="button">Metin Duzeltme</button>
                <button class="btn btn-primary" data-action="brainstorm" type="button">Beyin Firtinasi</button>
                <button class="btn btn-primary" data-action="web-search" type="button">Web Aramasi</button>
            </div>

            <label class="field">
                <span>Mesajiniz</span>
                <textarea id="promptText" rows="5" placeholder="Ornek: Bu metni resmi ve ikna edici dille duzelt."></textarea>
            </label>

            <div class="actions">
                <button id="sendChatBtn" class="btn btn-primary" type="button">Chatbot'a Gonder</button>
            </div>

            <label class="checkbox">
                <input type="checkbox" id="autoReplace" />
                <span>Sonucu otomatik secime uygula</span>
            </label>
            <label class="checkbox">
                <input type="checkbox" id="includeDocumentContext" checked />
                <span>Belgenin tamamini baglam olarak gonder</span>
            </label>
        </section>

        <section class="card">
            <h2>3) Chatbot Sonucu</h2>
            <label class="field">
                <span>AI cikti metni</span>
                <textarea id="resultText" rows="10" placeholder="AI sonucu burada gorunur."></textarea>
            </label>
            <div class="actions">
                <button id="replaceSelectionBtn" class="btn btn-secondary" type="button">Secime Uygula</button>
            </div>
        </section>

        <details class="card">
            <summary>Gelismis Ayarlar</summary>
            <label class="field">
                <span>API Base URL</span>
                <input id="apiBaseUrl" type="text" placeholder="https://your-domain.com" />
            </label>
            <label class="field">
                <span>Opsiyonel x-api-key</span>
                <input id="apiKey" type="password" placeholder="SERVER_API_KEY varsa girin" />
            </label>
            <label class="field">
                <span>Opsiyonel Bearer Token</span>
                <input id="authToken" type="password" placeholder="Supabase access token (otomatik bulunamazsa)" />
            </label>
            <div class="actions">
                <button id="refreshQuotaBtn" class="btn btn-secondary" type="button">Kotayi Yenile</button>
            </div>
        </details>

        <p id="status" class="status" role="status" aria-live="polite">Office yukleniyor...</p>
        <p id="quotaInfo" class="status" role="status" aria-live="polite">Kota: giris yapildiginda guncellenir.</p>
    </main>
    <script type="module" src="./taskpane.js?v=20260303-4"></script>
</body>
</html>
